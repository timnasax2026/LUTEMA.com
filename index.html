<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUTEMA JR | PREDATOR AI v6.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-green: #00ff9d;
            --predator-red: #ff3e3e;
            --cyber-blue: #00d4ff;
            --dark-bg: #020b10;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: white; overflow: hidden;
            background-size: cover; background-position: center;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(2,11,16,1) 100%);
            z-index: 1;
        }

        .container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px;
            width: 100%; max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; letter-spacing: 4px; margin: 0; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
        .tagline { font-size: 0.7rem; letter-spacing: 3px; color: var(--predator-red); margin-bottom: 25px; }

        input, select {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(0,0,0,0.6); border: 1px solid var(--cyber-blue);
            color: white; border-radius: 12px; font-family: inherit; box-sizing: border-box;
        }

        .btn-glow {
            width: 100%; padding: 18px; background: linear-gradient(45deg, var(--cyber-blue), var(--neon-green));
            border: none; border-radius: 12px; color: black; font-weight: 700;
            text-transform: uppercase; cursor: pointer; letter-spacing: 2px;
        }

        /* Dashboard Items */
        #dashboard { display: none; }
        .main-display {
            border: 2px solid var(--neon-green); border-radius: 20px;
            padding: 25px; margin: 20px 0; background: rgba(0, 255, 157, 0.05);
        }

        .multiplier { font-family: 'Orbitron', sans-serif; font-size: 3.8rem; color: var(--predator-red); margin: 10px 0; text-shadow: 0 0 20px var(--predator-red); }

        .time-box { font-size: 1.2rem; color: #fff; font-weight: bold; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .info-item { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.05); }
        .info-item h4 { margin: 0 0 8px 0; color: var(--cyber-blue); font-size: 0.7rem; }

        .hist-val { display: block; margin-bottom: 4px; color: var(--neon-green); }

        /* Loader */
        #welcome-screen { display: none; }
        .loader { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid var(--neon-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="bg">
    <div class="overlay"></div>

    <div class="container">
        <div class="glass-card" id="login-card">
            <h1>LUTEMA JR</h1>
            <div class="tagline">ULTIMATE PREDATOR AI</div>
            <input type="text" id="username" placeholder="Username / Jina">
            <input type="text" id="phone" placeholder="Namba ya Simu (+255...)">
            <select id="company">
                <option value="">-- Chagua Kampuni --</option>
                <option value="Betika">BETIKA</option>
                <option value="Gal Sport">GAL SPORT</option>
                <option value="Premier Bet">PREMIER BET</option>
                <option value="Wasafi Bet">WASAFI BET</option>
                <option value="888Bet">888BET</option>
            </select>
            <button class="btn-glow" onclick="startApp()">UNGANISHA MFUMO</button>
        </div>

        <div class="glass-card" id="welcome-screen">
            <h1 id="welcome-msg">WELCOME</h1>
            <p>Inatafuta Signal za <span id="target-comp" style="color: var(--cyber-blue);"></span>...</p>
            <div class="loader"></div>
            <p style="font-size: 0.7rem; opacity: 0.6;">SERVER STATUS: ENCRYPTED</p>
        </div>

        <div class="glass-card" id="dashboard">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 15px; opacity: 0.7;">
                <span id="user-display"></span>
                <span id="comp-display" style="color: var(--cyber-blue);"></span>
            </div>

            <div class="main-display">
                <div style="font-size: 0.7rem; letter-spacing: 2px;">LIVE PREDICTION</div>
                <div class="multiplier" id="current-x">SCANNING</div>
                <div class="time-box" id="next-time">SYNCING...</div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <h4>PAST RESULTS</h4>
                    <div id="hist-list"></div>
                </div>
                <div class="info-item">
                    <h4>UPCOMING</h4>
                    <div id="up-list"></div>
                </div>
            </div>

            <p style="margin-top: 20px; font-size: 0.6rem; opacity: 0.4;">
                PREDATOR v6.0 | SECURE LINE: +255784766591
            </p>
        </div>
    </div>

    <script>
        const wallpapers = [
            'https://wallpaperaccess.com/full/1567665.jpg',
            'https://wallpaperaccess.com/full/2454504.jpg',
            'https://wallpaperaccess.com/full/1892751.jpg'
        ];
        let wIdx = 0;
        function slide() {
            document.getElementById('bg').style.backgroundImage = `url('${wallpapers[wIdx]}')`;
            wIdx = (wIdx+1)%wallpapers.length;
        }
        setInterval(slide, 30000); slide();

        let upcoming = [];
        let history = [];

        function startApp() {
            const name = document.getElementById('username').value;
            const comp = document.getElementById('company').value;
            if(!name || !comp) return alert("Jaza Jina na Chagua Kampuni!");

            document.getElementById('login-card').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `HELLO, ${name.toUpperCase()}`;
            document.getElementById('target-comp').innerText = comp;

            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-display').innerText = `👤 ${name}`;
                document.getElementById('comp-display').innerText = `🎰 ${comp}`;
                
                for(let i=0; i<3; i++) upcoming.push(generatePredatorX());
                updateUI();
                engine();
            }, 3500);
        }

        // Realistic Odds Generator
        function generatePredatorX() {
            let r = Math.random();
            if(r > 0.995) return (Math.random() * 500 + 500).toFixed(2) + "x"; // 500x to 1000x
            if(r > 0.98) return (Math.random() * 400 + 100).toFixed(2) + "x"; // 100x to 500x
            if(r > 0.95) return (Math.random() * 50 + 50).toFixed(2) + "x";  // 50x to 100x
            if(r > 0.85) return (Math.random() * 10 + 2).toFixed(2) + "x";   // 2x to 12x
            return (Math.random() * 1.5 + 1.01).toFixed(2) + "x";            // 1x to 2.5x
        }

        function updateUI() {
            document.getElementById('up-list').innerHTML = upcoming.map(x => `<span class="hist-val" style="color:var(--cyber-blue)">▶ ${x}</span>`).join('');
            document.getElementById('hist-list').innerHTML = history.slice(-3).reverse().map(x => `<span class="hist-val">✓ ${x}</span>`).join('');
        }

        function engine() {
            const displayX = document.getElementById('current-x');
            const displayTime = document.getElementById('next-time');
            
            let targetX = upcoming.shift();
            upcoming.push(generatePredatorX());

            displayX.innerText = "---";
            displayX.style.color = "white";
            displayTime.innerText = "READY FOR NEXT";

            // Muda halisi wa kutoa signal
            setTimeout(() => {
                displayX.innerText = targetX;
                displayX.style.color = "var(--predator-red)";
                
                const now = new Date();
                // Tunaonyesha muda kamili wa mzunguko huu
                displayTime.innerText = `TIME: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                
                history.push(targetX);
                updateUI();

                // Mzunguko unaofuata baada ya sekunde 15 sawa na muda wa aviator
                setTimeout(engine, 15000); 
            }, 3000);
        }
    </script>
</body>
</html>
