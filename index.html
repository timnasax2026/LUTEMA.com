<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUTEMA Jr - Calculator & Pesa</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e293b;
            --accent: #10b981;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; margin-bottom: 30px; }
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
        }
        #display {
            width: 100%;
            height: 60px;
            background: #f1f5f9;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 28px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
        }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #f1f5f9;
            font-weight: 600;
            font-size: 1.1rem;
        }
        button:hover { background: #e2e8f0; }
        .equal-btn { background: var(--primary); color: white; grid-column: span 2; }
        .op-btn { color: var(--primary); }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>LUTEMA Jr</h1>
        <p>Calculator & Money Transfer</p>
    </header>

    <div class="card">
        <h3>Calculator</h3>
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons">
            <button onclick="clearDisplay()" style="color:#ef4444">AC</button>
            <button onclick="deleteLast()">⌫</button>
            <button class="op-btn" onclick="appendToDisplay('/')">÷</button>
            <button class="op-btn" onclick="appendToDisplay('*')">×</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="op-btn" onclick="appendToDisplay('-')">−</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="op-btn" onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="equal-btn" onclick="calculate()">=</button>
            <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <div class="card">
        <h3>Tuma Pesa</h3>
        <div id="step1">
            <input type="text" id="country" placeholder="Nchi (Mf: +255)">
            <input type="number" id="amt" placeholder="Kiasi">
            <button class="submit-btn" onclick="next()">Submit</button>
        </div>
        <div id="step2" style="display:none">
            <p id="res"></p>
            <input type="text" value="+255784766591" readonly style="background:#f1f5f9">
            <button class="submit-btn" onclick="alert('Imekamilika!'); location.reload()">Kamilisha</button>
        </div>
    </div>

    <script>
        const d = document.getElementById('display');
        function appendToDisplay(v) { d.value += v; }
        function clearDisplay() { d.value = ''; }
        function deleteLast() { d.value = d.value.slice(0,-1); }
        function calculate() { try { d.value = eval(d.value); } catch(e) { d.value = 'Error'; } }
        
        function next() {
            const c = document.getElementById('country').value;
            const a = document.getElementById('amt').value;
            if(!c || !a) return alert('Jaza fomu yote!');
            document.getElementById('step1').style.display='none';
            document.getElementById('step2').style.display='block';
            document.getElementById('res').innerText = `Kutoka ${c}, kiasi cha ${a}`;
        }
    </script>
</body>
</html>
