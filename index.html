
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUTEMA MOVES | Action & Clips</title>
    <style>
        :root {
            --primary-red: #e50914;
            --dark-bg: #141414;
            --card-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            transition: background-image 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Dark overlay to make content pop */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        header h1 {
            color: var(--primary-red);
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .container {
            padding: 40px 5%;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary-red);
            padding-left: 15px;
        }

        /* Movie Grid */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .movie-card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            box-shadow: var(--card-shadow);
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .movie-card .info {
            padding: 15px;
            text-align: center;
            background: #181818;
        }

        /* Payment Section */
        .payment-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            padding: 30px;
            border-radius: 15px;
            max-width: 450px;
            margin-top: 50px;
        }

        .payment-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .pay-btn {
            width: 100%;
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body id="bg-slider">
    <div class="overlay"></div>

    <div class="content-wrapper">
        <header>
            <h1>LUTEMA MOVES</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Action</a>
                <a href="#">Clips</a>
                <a href="#">Premium</a>
            </nav>
        </header>

        <div class="container">
            <h2 class="section-title">New Action Clips</h2>
            <div class="movie-grid">
                <div class="movie-card">
                    <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=400" alt="Action">
                    <div class="info">Action Sequence 01</div>
                </div>
                <div class="movie-card">
                    <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=400" alt="Action">
                    <div class="info">The Urban Pursuit</div>
                </div>
                <div class="movie-card">
                    <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=400" alt="Action">
                    <div class="info">Shadow Warrior</div>
                </div>
                <div class="movie-card">
                    <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=400" alt="Action">
                    <div class="info">Cine-Clips HD</div>
                </div>
            </div>

            <div class="payment-box">
                <h3>Support LUTEMA MOVES</h3>
                <p>Transfer to: <strong>+255784766591</strong></p>
                <input type="number" id="amt" placeholder="Enter Amount">
                <button class="pay-btn" onclick="submitPay()">Send Payment</button>
            </div>
        </div>

        <footer>
            &copy; 2026 LUTEMA MOVES. All Rights Reserved.
        </footer>
    </div>

    <script>
        // Wallpaper rotation logic
        const wallpapers = [
            'https://images.unsplash.com/photo-1616530940355-351fabd9524b?q=80&w=1920',
            'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1920',
            'https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1920',
            'https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=1920'
        ];

        let index = 0;
        const body = document.getElementById('bg-slider');

        function nextWallpaper() {
            body.style.backgroundImage = `url('${wallpapers[index]}')`;
            index = (index + 1) % wallpapers.length;
        }

        // Change every 30 seconds
        setInterval(nextWallpaper, 30000);
        nextWallpaper(); // Initial call

        function submitPay() {
            const val = document.getElementById('amt').value;
            if(val) alert('Payment request sent for ' + val + '. Success!');
            else alert('Please enter an amount.');
        }
    </script>
</body>
</html>
