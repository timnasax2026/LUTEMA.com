<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUTEMA JR | SECURE PREDATOR AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-green: #00ff9d;
            --predator-red: #ff3e3e;
            --cyber-blue: #00d4ff;
            --dark-bg: #020b10;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: white; overflow: hidden;
            background-size: cover; background-position: center;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(2,11,16,1) 100%);
            z-index: 1;
        }

        .container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px;
            width: 100%; max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; letter-spacing: 4px; margin: 0; color: var(--neon-green); }
        .tagline { font-size: 0.7rem; letter-spacing: 3px; color: var(--predator-red); margin-bottom: 25px; font-weight: bold; }

        input, select {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(0,0,0,0.7); border: 1px solid var(--cyber-blue);
            color: white; border-radius: 12px; font-family: inherit; font-size: 1rem;
            box-sizing: border-box; outline: none; text-align: center;
        }

        .btn-glow {
            width: 100%; padding: 18px; background: linear-gradient(45deg, var(--cyber-blue), var(--neon-green));
            border: none; border-radius: 12px; color: black; font-weight: 700;
            text-transform: uppercase; cursor: pointer; letter-spacing: 2px; transition: 0.3s;
        }

        .btn-glow:hover { box-shadow: 0 0 20px var(--neon-green); transform: translateY(-2px); }

        /* Sections Control */
        #verify-section, #dashboard, #welcome-screen { display: none; }

        /* Dashboard Items */
        .main-display {
            border: 2px solid var(--neon-green); border-radius: 20px;
            padding: 25px; margin: 20px 0; background: rgba(0, 255, 157, 0.05);
        }

        .multiplier { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: var(--predator-red); margin: 10px 0; text-shadow: 0 0 20px var(--predator-red); }

        .time-box { font-size: 1.1rem; color: #fff; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; border: 1px solid var(--cyber-blue); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .info-item { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .info-item h4 { margin: 0 0 5px 0; color: var(--cyber-blue); font-size: 0.65rem; }

        .hist-val { display: block; color: var(--neon-green); font-size: 0.9rem; }

        .loader { width: 35px; height: 35px; border: 4px solid #111; border-top: 4px solid var(--neon-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="bg">
    <div class="overlay"></div>

    <div class="container">
        <div class="glass-card" id="login-card">
            <h1>LUTEMA JR</h1>
            <div class="tagline">PREDATOR AI SYSTEM</div>
            <input type="text" id="username" placeholder="Full Name">
            <input type="text" id="phone" placeholder="Phone Number (e.g. 0784...)">
            <select id="company">
                <option value="">-- Choose Platform --</option>
                <option value="Betika">BETIKA</option>
                <option value="Gal Sport">GAL SPORT</option>
                <option value="Premier Bet">PREMIER BET</option>
                <option value="SportyBet">SPORTYBET</option>
            </select>
            <button class="btn-glow" onclick="showVerify()">REQUEST ACCESS CODE</button>
        </div>

        <div class="glass-card" id="verify-section">
            <h2 style="color: var(--neon-green);">VERIFICATION</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">A verification code was sent to <br><span id="sent-phone" style="color: var(--cyber-blue);"></span></p>
            <input type="password" id="pin" placeholder="ENTER 6-DIGIT PIN" maxlength="6">
            <button class="btn-glow" onclick="validatePin()">VERIFY & LOGIN</button>
            <p style="font-size: 0.7rem; margin-top: 15px; opacity: 0.6;">Hint: Check your SMS or use 123456</p>
        </div>

        <div class="glass-card" id="welcome-screen">
            <h1 id="welcome-msg">WELCOME</h1>
            <p>Syncing encrypted data for <span id="target-comp" style="color: var(--cyber-blue);"></span>...</p>
            <div class="loader"></div>
            <p style="font-size: 0.7rem; opacity: 0.6;">AUTH TOKEN: VALIDATED</p>
        </div>

        <div class="glass-card" id="dashboard">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 10px; opacity: 0.8;">
                <span id="user-display"></span>
                <span id="comp-display" style="color: var(--cyber-blue);"></span>
            </div>

            <div class="main-display">
                <div style="font-size: 0.7rem; letter-spacing: 2px;">LIVE PREDATOR ODDS</div>
                <div class="multiplier" id="current-x">SCANNING</div>
                <div class="time-box" id="next-time">SYNCING...</div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <h4>HISTORY</h4>
                    <div id="hist-list"></div>
                </div>
                <div class="info-item">
                    <h4>UPCOMING</h4>
                    <div id="up-list"></div>
                </div>
            </div>

            <p style="margin-top: 20px; font-size: 0.6rem; opacity: 0.4;">
                PROTECTED BY LUTEMA AI | +255784766591
            </p>
        </div>
    </div>

    <script>
        const wallpapers = [
            'https://wallpaperaccess.com/full/1567665.jpg',
            'https://wallpaperaccess.com/full/2454504.jpg',
            'https://wallpaperaccess.com/full/1892751.jpg'
        ];
        let wIdx = 0;
        function slide() {
            document.getElementById('bg').style.backgroundImage = `url('${wallpapers[wIdx]}')`;
            wIdx = (wIdx+1)%wallpapers.length;
        }
        setInterval(slide, 30000); slide();

        let upcoming = [];
        let history = [];

        function showVerify() {
            const name = document.getElementById('username').value;
            const phone = document.getElementById('phone').value;
            const comp = document.getElementById('company').value;

            if(!name || !phone || !comp) return alert("Please fill all fields!");

            document.getElementById('login-card').style.display = 'none';
            document.getElementById('sent-phone').innerText = phone;
            document.getElementById('verify-section').style.display = 'block';
        }

        function validatePin() {
            const pin = document.getElementById('pin').value;
            if(pin.length < 4) return alert("Enter a valid code!");

            // Transition to Welcome
            document.getElementById('verify-section').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'block';
            
            const name = document.getElementById('username').value;
            const comp = document.getElementById('company').value;
            document.getElementById('welcome-msg').innerText = `WELCOME, ${name.toUpperCase()}`;
            document.getElementById('target-comp').innerText = comp;

            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-display').innerText = `👤 ${name}`;
                document.getElementById('comp-display').innerText = `🎰 ${comp}`;
                
                for(let i=0; i<3; i++) upcoming.push(genX());
                updateUI();
                engine();
            }, 3000);
        }

        function genX() {
            let r = Math.random();
            if(r > 0.99) return (Math.random() * 500 + 500).toFixed(2) + "x";
            if(r > 0.95) return (Math.random() * 100 + 50).toFixed(2) + "x";
            if(r > 0.8) return (Math.random() * 10 + 2).toFixed(2) + "x";
            return (Math.random() * 1.5 + 1.01).toFixed(2) + "x";
        }

        function updateUI() {
            document.getElementById('up-list').innerHTML = upcoming.map(x => `<span class="hist-val" style="color:var(--cyber-blue)">▶ ${x}</span>`).join('');
            document.getElementById('hist-list').innerHTML = history.slice(-3).reverse().map(x => `<span class="hist-val">✓ ${x}</span>`).join('');
        }

        function engine() {
            const displayX = document.getElementById('current-x');
            const displayTime = document.getElementById('next-time');
            
            let targetX = upcoming.shift();
            upcoming.push(genX());

            displayX.innerText = "WAIT";
            displayX.style.color = "white";

            setTimeout(() => {
                displayX.innerText = targetX;
                displayX.style.color = "var(--predator-red)";
                
                const now = new Date();
                displayTime.innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                
                history.push(targetX);
                updateUI();
                setTimeout(engine, 15000); 
            }, 3000);
        }
    </script>
</body>
</html>
