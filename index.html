<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUTEMA Jr - Aviator Predator Predictor</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-black: #050505;
            --predator-red: #ff0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-black);
            color: var(--neon-green);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 2px solid var(--neon-green);
            border-radius: 15px;
            box-shadow: 0 0 30px var(--neon-green);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .subtitle {
            color: var(--predator-red);
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            border-radius: 5px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn-predict {
            width: 100%;
            padding: 15px;
            background: var(--neon-green);
            color: black;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-predict:hover {
            box-shadow: 0 0 20px var(--neon-green);
            transform: scale(1.02);
        }

        /* Prediction Result */
        #prediction-box {
            margin-top: 25px;
            padding: 20px;
            border: 1px dashed var(--neon-green);
            display: none;
            background: rgba(0, 255, 65, 0.05);
        }

        .loading-text {
            color: white;
            font-style: italic;
        }

        .result-value {
            font-size: 2.5rem;
            color: var(--predator-red);
            margin: 10px 0;
            font-weight: bold;
        }

        .time-value {
            font-size: 1.2rem;
            color: white;
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.6;
        }
    </style>
</head>
<body id="bg-slider">
    <div class="overlay"></div>

    <div class="main-container">
        <h1>LUTEMA Jr</h1>
        <div class="subtitle">AVIATOR PREDATOR</div>

        <div id="form-section">
            <input type="text" id="phone" placeholder="Ingiza Namba ya Simu">
            <input type="text" id="company" placeholder="Ingiza Kampuni (Mf: Betika)">
            <button class="btn-predict" onclick="startPrediction()">Predict Next Round</button>
        </div>

        <div id="prediction-box">
            <div id="loading" class="loading-text">Connecting to Server...</div>
            <div id="result-content" style="display: none;">
                <div>NEXT ROUND PREDICTION:</div>
                <div class="result-value" id="next-x">--</div>
                <div class="time-value">Muda: <span id="next-time">--</span></div>
                <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Target detected! Withdraw on time.</p>
            </div>
        </div>

        <footer>
            &copy; 2026 LUTEMA Jr Predator Algorithm | +255784766591
        </footer>
    </div>

    <script>
        // Wallpapers changing every 30 seconds
        const wallpapers = [
            'https://wallpaperaccess.com/full/1567665.jpg',
            'https://wallpaperaccess.com/full/2454504.jpg',
            'https://wallpaperaccess.com/full/1892751.jpg'
        ];

        let bgIndex = 0;
        const body = document.getElementById('bg-slider');

        function changeBg() {
            body.style.backgroundImage = `url('${wallpapers[bgIndex]}')`;
            bgIndex = (bgIndex + 1) % wallpapers.length;
        }
        setInterval(changeBg, 30000);
        changeBg();

        // Prediction Logic
        function startPrediction() {
            const phone = document.getElementById('phone').value;
            const company = document.getElementById('company').value;

            if(!phone || !company) {
                alert("Tafadhali jaza namba na kampuni!");
                return;
            }

            // Show box and loading
            document.getElementById('prediction-box').style.display = 'block';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result-content').style.display = 'none';

            // Fake processing time
            setTimeout(() => {
                document.getElementById('loading').innerText = "Analyzing " + company + " Data...";
                
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('result-content').style.display = 'block';
                    
                    // Generate random prediction
                    const randomX = (Math.random() * (10.0 - 1.5) + 1.5).toFixed(2) + "X";
                    
                    // Get current time + some seconds for next round
                    const now = new Date();
                    now.setSeconds(now.getSeconds() + Math.floor(Math.random() * 60) + 10);
                    
                    const minutes = now.getMinutes().toString().padStart(2, '0');
                    const seconds = now.getSeconds().toString().padStart(2, '0');
                    
                    document.getElementById('next-x').innerText = randomX;
                    document.getElementById('next-time').innerText = minutes + ":" + seconds;
                    
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
