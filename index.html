<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUTEMA JR | AVIATOR PREDATOR GLOBAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-green: #00ff9d;
            --predator-red: #ff3e3e;
            --cyber-blue: #00d4ff;
            --dark-bg: #020b10;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: white; overflow-x: hidden;
            background-size: cover; background-position: center;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(2,11,16,1) 100%);
            z-index: 1;
        }

        .container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            width: 100%; max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 3px; margin: 0; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
        .tagline { font-size: 0.7rem; color: var(--predator-red); margin-bottom: 20px; font-weight: bold; }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 12px;
            background: rgba(0,0,0,0.7); border: 1px solid var(--cyber-blue);
            color: white; border-radius: 10px; font-family: inherit;
            box-sizing: border-box; text-align: center;
        }

        /* Search List Styling */
        .search-box {
            position: relative;
            margin-bottom: 15px;
        }

        #companyList {
            max-height: 150px; overflow-y: auto;
            background: rgba(0,0,0,0.9); border: 1px solid var(--neon-green);
            border-radius: 8px; display: none; text-align: left;
            position: absolute; width: 100%; z-index: 100;
        }

        .company-option { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .company-option:hover { background: var(--cyber-blue); color: black; }

        .btn-glow {
            width: 100%; padding: 16px; background: linear-gradient(45deg, var(--cyber-blue), var(--neon-green));
            border: none; border-radius: 10px; color: black; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }

        .whatsapp-btn {
            background: #25d366; color: white; padding: 10px;
            border-radius: 50px; text-decoration: none; display: inline-flex;
            align-items: center; justify-content: center; margin-top: 15px;
            font-size: 0.8rem; font-weight: bold; width: 100%;
        }

        #verify-section, #dashboard, #welcome-screen { display: none; }

        .main-display {
            border: 2px solid var(--neon-green); border-radius: 20px;
            padding: 20px; margin: 15px 0; background: rgba(0, 255, 157, 0.05);
        }

        .multiplier { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; color: var(--predator-red); margin: 5px 0; }

        .time-box { font-size: 1rem; color: #fff; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; border: 1px solid var(--cyber-blue); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; font-size: 0.75rem; text-align: left; }

        .loader { width: 30px; height: 30px; border: 3px solid #111; border-top: 3px solid var(--neon-green); border-radius: 50%; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="bg">
    <div class="overlay"></div>

    <div class="container">
        <div class="glass-card" id="login-card">
            <h1>LUTEMA JR</h1>
            <div class="tagline">AVIATOR PREDATOR PRO</div>
            
            <input type="text" id="username" placeholder="Enter Full Name">
            
            <div style="display: flex; gap: 5px;">
                <input type="text" id="countryCode" placeholder="+255" style="width: 30%;">
                <input type="text" id="phone" placeholder="Phone Number" style="width: 70%;">
            </div>

            <div class="search-box">
                <input type="text" id="searchComp" placeholder="🔍 Search Company (Betika, 1xBet...)" onkeyup="filterCompanies()">
                <div id="companyList"></div>
                <input type="hidden" id="selectedCompany">
            </div>

            <button class="btn-glow" onclick="showVerify()">REQUEST ACCESS PIN</button>
            
            <a href="https://wa.me/255784766591?text=Hello%20Lutema%20Jr,%20I%20need%20help%20with%20the%20Aviator%20Predator%20App" class="whatsapp-btn" target="_blank">
                CHAT WITH OWNER (WHATSAPP)
            </a>
        </div>

        <div class="glass-card" id="verify-section">
            <h2 style="color: var(--neon-green);">VERIFICATION</h2>
            <p style="font-size: 0.8rem;">Access Code required for security.</p>
            <input type="password" id="pin" placeholder="ENTER 6-DIGIT PIN">
            <button class="btn-glow" onclick="validatePin()">LOGIN TO ENGINE</button>
        </div>

        <div class="glass-card" id="welcome-screen">
            <h1 id="welcome-msg">WELCOME</h1>
            <p id="sync-text">Syncing algorithms...</p>
            <div class="loader"></div>
        </div>

        <div class="glass-card" id="dashboard">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; opacity: 0.8;">
                <span id="user-display"></span>
                <span id="comp-display" style="color: var(--cyber-blue);"></span>
            </div>

            <div class="main-display">
                <div style="font-size: 0.6rem; letter-spacing: 2px;">LIVE PREDATOR ODDS</div>
                <div class="multiplier" id="current-x">WAIT</div>
                <div class="time-box" id="next-time">--:--:--</div>
            </div>

            <div class="info-grid">
                <div class="info-item"><h4>HISTORY</h4><div id="hist-list"></div></div>
                <div class="info-item"><h4>UPCOMING</h4><div id="up-list"></div></div>
            </div>

            <a href="https://wa.me/255784766591" style="font-size: 0.6rem; color: #888; text-decoration: none; display: block; margin-top: 15px;">
                Support: +255 784 766 591
            </a>
        </div>
    </div>

    <script>
        // List of 200+ Companies
        const companies = [
            "Betika", "Gal Sport", "Premier Bet", "Wasafi Bet", "SportyBet", "888Bet", "Parimatch", "M-Bet", "SokaBet", "PlayMaster", "Betway", "22Bet", "1xBet", "Bet365", "Bwin", "Betfair", "Unibet", "William Hill", "DraftKings", "FanDuel", "BetMGM", "Mozzart Bet", "BetKing", "Bet9ja", "NairaBet", "Hollywoodbets", "Supabets", "Odibets", "BetLion", "Melbet", "Bet Winner"
        ];
        // Add more dummy platforms to reach 200
        for(let i=1; i<=170; i++) { companies.push("Global Platform " + (i+100)); }

        function filterCompanies() {
            const input = document.getElementById('searchComp').value.toLowerCase();
            const list = document.getElementById('companyList');
            list.innerHTML = "";
            if(!input) { list.style.display = "none"; return; }
            
            const filtered = companies.filter(c => c.toLowerCase().includes(input));
            if(filtered.length > 0) {
                list.style.display = "block";
                filtered.forEach(c => {
                    let div = document.createElement('div');
                    div.className = "company-option";
                    div.innerText = c;
                    div.onclick = () => {
                        document.getElementById('searchComp').value = c;
                        document.getElementById('selectedCompany').value = c;
                        list.style.display = "none";
                    };
                    list.appendChild(div);
                });
            } else { list.style.display = "none"; }
        }

        function showVerify() {
            const name = document.getElementById('username').value;
            const comp = document.getElementById('selectedCompany').value || document.getElementById('searchComp').value;
            if(!name || !comp) return alert("Please fill Name and select a Company!");
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('verify-section').style.display = 'block';
        }

        function validatePin() {
            const pin = document.getElementById('pin').value;
            if(!pin) return alert("Enter Access Code!");
            
            document.getElementById('verify-section').style.display = 'none';
            document.getElementById('welcome-screen').style.display = 'block';
            
            const name = document.getElementById('username').value;
            const comp = document.getElementById('selectedCompany').value || document.getElementById('searchComp').value;
            document.getElementById('welcome-msg').innerText = `HELLO, ${name.toUpperCase()}`;
            document.getElementById('sync-text').innerText = `Syncing ${comp} Server...`;

            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-display').innerText = `👤 ${name}`;
                document.getElementById('comp-display').innerText = `🎰 ${comp}`;
                startEngine();
            }, 3000);
        }

        let history = [];
        let upcoming = [];

        function genX() {
            let r = Math.random();
            if(r > 0.98) return (Math.random() * 900 + 100).toFixed(2) + "x";
            if(r > 0.9) return (Math.random() * 50 + 5).toFixed(2) + "x";
            return (Math.random() * 1.5 + 1.01).toFixed(2) + "x";
        }

        function startEngine() {
            if(upcoming.length < 3) for(let i=0; i<3; i++) upcoming.push(genX());
            const displayX = document.getElementById('current-x');
            const displayTime = document.getElementById('next-time');
            
            let targetX = upcoming.shift();
            upcoming.push(genX());

            displayX.innerText = "WAIT";
            displayX.style.color = "white";

            setTimeout(() => {
                displayX.innerText = targetX;
                displayX.style.color = "var(--predator-red)";
                
                // Get Local Time based on user's country/device
                const now = new Date();
                displayTime.innerText = now.toLocaleTimeString(); 
                
                history.push(targetX);
                document.getElementById('up-list').innerHTML = upcoming.map(x => `<div style="color:var(--cyber-blue)">▶ ${x}</div>`).join('');
                document.getElementById('hist-list').innerHTML = history.slice(-3).reverse().map(x => `<div>✓ ${x}</div>`).join('');
                
                setTimeout(startEngine, 15000);
            }, 3000);
        }
    </script>
</body>
</html>
