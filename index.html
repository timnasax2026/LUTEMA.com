<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUTEMA Jr - Aviator Predator</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-black: #0d0d0d;
            --overlay: rgba(0, 0, 0, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--dark-black);
            color: var(--neon-green);
            overflow-x: hidden;
            transition: background 2s ease-in-out;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            z-index: -1;
        }

        header {
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 20px var(--neon-green);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .container {
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--neon-green);
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .status-blink {
            height: 10px;
            width: 10px;
            background-color: red;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
            margin-right: 10px;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .btn {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .input-field {
            width: 100%;
            padding: 10px;
            background: black;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            border-top: 1px solid var(--neon-green);
            margin-top: 50px;
        }
    </style>
</head>
<body id="dynamic-bg">
    <div class="bg-overlay"></div>

    <header>
        <h1>LUTEMA Jr PREDATOR</h1>
        <p>[ System Status: <span class="status-blink" style="background-color: var(--neon-green);"></span>Active ]</p>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h2>AVIATOR SIGNALS</h2>
                <p>Current Algorithm: v2.4</p>
                <div style="font-size: 2rem; margin: 20px 0;">1.98x - 5.40x</div>
                <button class="btn" onclick="alert('Searching for next flight...')">Get Next Signal</button>
            </div>

            <div class="card">
                <h2>PREDATOR CAMPAIGN</h2>
                <p>Target: Multiplier X100</p>
                <ul style="text-align: left; list-style: none; padding: 0;">
                    <li>> Scanning market...</li>
                    <li>> Predator mode: ON</li>
                </ul>
                <button class="btn" style="background: #ff0000; color: white;">Activate Predator</button>
            </div>

            <div class="card">
                <h2>VIP ACCESS</h2>
                <p>Send Fee to: <b>+255784766591</b></p>
                <input type="number" class="input-field" placeholder="Amount Paid">
                <input type="text" class="input-field" placeholder="Transaction ID">
                <button class="btn" onclick="alert('Verifying payment...')">Verify Access</button>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 LUTEMA Jr - AVIATOR PREDATOR ALL CAMPAIGN
    </footer>

    <script>
        // Wallpapers: Aviator, Predator, and Tech Themes
        const wallpapers = [
            'https://wallpaperaccess.com/full/1567665.jpg', // Hacker/Tech
            'https://wallpaperaccess.com/full/2454504.jpg', // Predator style
            'https://wallpaperaccess.com/full/1150654.jpg', // Plane/Aviator style
            'https://wallpaperaccess.com/full/1892751.jpg'  // Matrix style
        ];

        let bgIndex = 0;
        const body = document.getElementById('dynamic-bg');

        function rotateBg() {
            body.style.backgroundImage = `url('${wallpapers[bgIndex]}')`;
            bgIndex = (bgIndex + 1) % wallpapers.length;
        }

        // Change every 30 seconds
        setInterval(rotateBg, 30000);
        rotateBg(); // Start first wallpaper
    </script>
</body>
</html>
